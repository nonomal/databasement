# Local development compose. DB ports are bound to 127.0.0.1 only.
# For production self-hosting: https://david-crty.github.io/databasement/self-hosting/docker-compose

services:
  app:
    image: davidcrty/databasement-php
    build:
      context: docker/php
    volumes:
      - .:/app
      - app-data:/data
    ports:
      - "2226:2226"
    extra_hosts:
      - "dex-local:host-gateway"
    environment:
      TZ: UTC
      XDG_CONFIG_HOME: /tmp
      # UID/GID for the application user (defaults to 1000:1000)
      # Set these to match your host user for proper file permissions
      UID: 1000
      GID: 1000
    depends_on:
      - rustfs

  worker:
    image: davidcrty/databasement-php
    build:
      context: docker/php
    volumes:
      - .:/app
      - app-data:/data
    command: sh -c "php artisan db:wait --check-migrations && php artisan queue:work --queue=backups,default --tries=3 --timeout=3600 --sleep=3 --max-jobs=1000"
    restart: unless-stopped
    environment:
      TZ: UTC
      UID: 1000
      GID: 1000
    depends_on:
      - app
      - rustfs

  mysql:
    image: mysql:8.0
    container_name: databasement-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: databasement
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: databasement-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: databasement
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d databasement" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: databasement-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: databasement-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mssql:
    # azure-sql-edge is multi-arch (works on Apple Silicon); same TDS protocol as SQL Server
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: databasement-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Databasement!Strong1"
    ports:
      - "127.0.0.1:1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1433 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  ssh:
    image: linuxserver/openssh-server:latest
    container_name: databasement-ssh
    environment:
      PUID: 1000
      PGID: 1000
      TZ: UTC
      USER_NAME: testuser
      USER_PASSWORD: testpass
      PASSWORD_ACCESS: "true"
      DOCKER_MODS: linuxserver/mods:openssh-server-ssh-tunnel
    ports:
      - "127.0.0.1:2222:2222"
    healthcheck:
      test: [ "CMD-SHELL", "netstat -tlnp | grep -q ':2222'" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    container_name: databasement-rustfs
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ADDRESS: ":9001"
    volumes:
      - rustfs-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

