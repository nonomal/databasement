version: 2

updates:
  # PHP/Composer - root only
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "monthly"

  # npm - root only (excludes docs/)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
